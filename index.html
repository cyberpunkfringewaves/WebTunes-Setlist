<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebTunes Setlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside id="sidebar"></aside>

  <!-- RIGHT MAIN AREA -->
  <main id="main-area">

    <!-- HOME CAROUSEL -->
    <section id="home-carousel"></section>

    <!-- BAND / ALBUM PAGE -->
    <section id="virtual-page" class="hidden">

      <div class="album-layout">

        <!-- LEFT: MEDIA -->
        <div class="album-media">
          <img id="album-cover-img" src="" alt="">
          <video id="album-video" muted loop playsinline class="hidden"></video>
        </div>

        <!-- RIGHT: TABS + CONTENT -->
        <div class="album-panel">

          <!-- TABS -->
          <div class="tabs">
            <button id="tab-albums" class="tab-btn active" data-tab="tracks">Albums</button>
            <button id="tab-lyrics" class="tab-btn" data-tab="lyrics-sidebar">Lyrics</button>
            <button id="tab-related" class="tab-btn" data-tab="related">Related</button>
          </div>

          <!-- TAB CONTENT -->
          <div class="tab-container">
            <div id="tracks" class="tab-content"></div>
            <div id="lyrics-sidebar" class="tab-content hidden"></div>
            <div id="related" class="tab-content hidden"></div>
          </div>

        </div>

      </div>

    </section>

  </main>

<footer id="player-footer" class="hidden">

  <!-- LEFT CONTROLS -->
  <div class="player-left">
    <button id="prev-btn" class="icon-btn prev-icon"></button>
    <button id="play-pause" class="icon-btn playpause-icon circle-btn"></button>
    <button id="next-btn" class="icon-btn next-icon"></button>
    <button id="shuffle-btn" class="icon-btn shuffle-icon"></button>
    <button id="repeat-btn" class="icon-btn repeat-icon"></button>
  </div>

  <!-- TIME DISPLAY (NOW OUTSIDE THE CONTROL ROW) -->
  <div id="time-display" class="time-display">0:00 / 0:00</div>

  <!-- CENTER: COVER + TITLE + ARTIST -->
  <div class="player-center-info">
    <img id="footer-thumb" src="" alt="">
    <div class="footer-meta">
      <div id="footer-title"></div>
      <div id="footer-artist" class="footer-artist-link"></div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="player-center">
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- RIGHT CONTROLS -->
  <div class="player-right">
    <button id="volume-btn" class="icon-btn volume-icon"></button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" class="hidden">
  </div>

  <audio id="audio-player" class="hidden"></audio>
  <video id="video-player" class="hidden"></video>

</footer>

  <!-- ONLY app.js, NO inline showTab -->
  <script src="js/app.js"></script>
</body>
</html>
